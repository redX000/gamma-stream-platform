name: Content Generation

on:
  schedule:
    # Daily at 06:00 UTC — Mon/Wed/Fri publish days determined by scheduler.js
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run even if today is not a publish day'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry run — generate and score but skip WordPress publish'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: content-generation
  cancel-in-progress: false

jobs:
  generate-and-publish:
    name: Generate & Publish Article
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so queue.json commits have correct ancestry
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore queue state
        uses: actions/cache@v4
        with:
          path: content-pipeline/queue.json
          key: queue-state-${{ github.run_id }}
          restore-keys: |
            queue-state-

      - name: Run content pipeline
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_PASSWORD: ${{ secrets.WORDPRESS_PASSWORD }}
        run: |
          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FLAGS="$FLAGS --force"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          node content-pipeline/scheduler.js $FLAGS
        continue-on-error: true

      - name: Save updated queue state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: content-pipeline/queue.json
          key: queue-state-${{ github.run_id }}

      - name: Upload generated article as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-article-${{ github.run_number }}
          path: content-pipeline/generated/
          retention-days: 30
          if-no-files-found: ignore

      - name: Send failure notification
        if: steps.pipeline.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: '❌ Gamma Stream — Content pipeline failed (${{ github.run_number }})'
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: Gamma Stream <${{ secrets.SMTP_USER }}>
          body: |
            The daily content generation pipeline failed.

            Run: ${{ github.run_number }}
            Time: ${{ github.event.head_commit.timestamp }}
            Branch: ${{ github.ref_name }}

            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Common causes:
            - ANTHROPIC_API_KEY expired or rate-limited
            - WORDPRESS_PASSWORD changed (check GitHub secret)
            - JWT Auth plugin deactivated on WordPress
            - WordPress site unreachable

      - name: Fail job if pipeline errored
        if: steps.pipeline.outcome == 'failure'
        run: exit 1
